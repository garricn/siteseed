name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Lint + test
        run: make check

      - name: Verify package contents
        run: npm pack --dry-run
