openapi: "3.0.3"
info:
  title: Petstore
  version: "1.0.0"
servers:
  - url: https://api.petstore.example.com
paths: {}
components:
  schemas:
    Pet:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        status:
          type: string
          enum: [available, pending, sold]
